<!DOCTYPE html>
<html>

<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta charset="utf-8">
  <title>AEM Asset Selector</title>
  <script
    src="https://experience.adobe.com/solutions/CQ-assets-selectors/static-assets/resources/assets-selectors.js"></script>
  <style>
    :root {
      --bg: #0f0f12;
      --s1: #151518;
      --s2: #1c1c21;
      --s3: #242429;
      --b: #2a2a32;
      --t1: #eaeaef;
      --t2: #a0a0ae;
      --t3: #6a6a78;
      --red: #eb1000;
      --green: #22c55e;
      --blue: #3b82f6;
      --f: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      font-family: var(--f);
      background: var(--bg);
      color: var(--t1);
      display: flex;
      flex-direction: column;
      font-size: 13px
    }

    .hidden {
      display: none !important
    }

    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--b);
      background: var(--s1);
      flex-shrink: 0
    }

    .hdr-logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 13px
    }

    .hdr-logo svg {
      color: var(--red)
    }

    .ib {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: var(--t3);
      cursor: pointer
    }

    .ib:hover {
      background: var(--s2);
      color: var(--t1)
    }

    .setup {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px
    }

    .setup-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(235, 16, 0, .1);
      color: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px
    }

    .setup h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px
    }

    .setup .desc {
      font-size: 12px;
      color: var(--t2);
      line-height: 1.6;
      margin-bottom: 18px
    }

    .fld {
      margin-bottom: 12px
    }

    .fld label {
      display: block;
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--t3);
      margin-bottom: 4px
    }

    .fld input {
      width: 100%;
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--b);
      border-radius: 6px;
      background: var(--s2);
      color: var(--t1);
      font-size: 12px;
      font-family: var(--f);
      outline: none;
      transition: border-color .15s
    }

    .fld input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(235, 16, 0, .1)
    }

    .fld input::placeholder {
      color: var(--t3);
      opacity: .5
    }

    .fld .h {
      font-size: 10px;
      color: var(--t3);
      margin-top: 3px
    }

    .opt {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      opacity: .6
    }

    .btn-launch {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 38px;
      border: none;
      border-radius: 6px;
      background: var(--red);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--f);
      cursor: pointer;
      margin-top: 16px
    }

    .btn-launch:hover {
      background: #d10e00
    }

    #aem-selector {
      flex: 1;
      overflow: auto
    }

    .tray {
      border-top: 1px solid var(--b);
      background: var(--s1);
      flex-shrink: 0;
      max-height: 45%;
      overflow-y: auto
    }

    .tray-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--b);
      position: sticky;
      top: 0;
      background: var(--s1);
      z-index: 1
    }

    .tray-hdr span {
      font-size: 11px;
      font-weight: 600;
      color: var(--t3)
    }

    .tray-clr {
      background: none;
      border: none;
      color: var(--red);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--f)
    }

    .tray-list {
      padding: 6px
    }

    .acard {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid var(--b);
      border-radius: 8px;
      background: var(--s2);
      margin-bottom: 6px
    }

    .acard-thumb {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--s3);
      display: flex;
      align-items: center;
      justify-content: center
    }

    .acard-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .acard-thumb .ext {
      font-size: 10px;
      font-weight: 700;
      color: var(--red);
      text-transform: uppercase
    }

    .acard-info {
      flex: 1;
      min-width: 0
    }

    .acard-name {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px
    }

    .acard-path {
      font-size: 10px;
      color: var(--t3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .acard-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px
    }

    .acard-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border: 1px solid var(--b);
      border-radius: 4px;
      background: var(--s3);
      color: var(--t2);
      font-size: 10px;
      font-weight: 600;
      font-family: var(--f);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap
    }

    .acard-btn:hover {
      background: var(--b);
      color: var(--t1)
    }

    .acard-btn.copied {
      background: rgba(34, 197, 94, .15);
      border-color: var(--green);
      color: var(--green)
    }

    .acard-btn.send {
      background: rgba(59, 130, 246, .12);
      border-color: rgba(59, 130, 246, .3);
      color: var(--blue)
    }

    .acard-btn.send:hover {
      background: rgba(59, 130, 246, .25)
    }

    .acard-remove {
      background: none;
      border: none;
      color: var(--t3);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      line-height: 1;
      flex-shrink: 0
    }

    .acard-remove:hover {
      color: var(--red)
    }

    .ftr {
      padding: 4px 12px;
      border-top: 1px solid var(--b);
      font-size: 9px;
      color: var(--t3);
      text-align: center;
      flex-shrink: 0;
      background: var(--s1)
    }

    .ftr a {
      color: var(--red);
      text-decoration: none
    }

    .toast {
      position: fixed;
      bottom: 8px;
      left: 8px;
      right: 8px;
      padding: 7px 12px;
      border-radius: 6px;
      background: var(--s2);
      border: 1px solid var(--b);
      font-size: 11px;
      z-index: 9999;
      animation: su .25s ease
    }

    .toast.ok {
      border-color: var(--green)
    }

    .toast.err {
      border-color: var(--red)
    }

    .toast.blue {
      border-color: var(--blue)
    }

    @keyframes su {
      from {
        transform: translateY(10px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--b);
      border-radius: 2px
    }
  </style>
</head>

<body>
  <div class="hdr">
    <div class="hdr-logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M4 4h7v7H4V4zm9 0h7v7h-7V4zm-9 9h7v7H4v-7zm12.5 0l3.5 7h-7l3.5-7z" fill="currentColor" />
      </svg>
      <span>AEM Assets</span>
    </div>
    <button class="ib" id="btn-settings" title="Settings" style="display:none" onclick="showSetup()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
        <path
          d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
          stroke="currentColor" stroke-width="2" />
      </svg>
    </button>
  </div>

  <div id="v-setup" class="setup">
    <div class="setup-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 15V3m0 12l-4-4m4 4l4-4M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg></div>
    <h2>Connect to AEM</h2>
    <p class="desc">Enter your credentials once. Stored in this browser only.</p>
    <form id="cfg-form" autocomplete="off">
      <div class="fld"><label>IMS Client ID *</label><input type="text" id="f-client" placeholder="your-ims-client-id"
          required>
        <div class="h">Provided by Adobe after provisioning</div>
      </div>
      <div class="fld"><label>IMS Org ID *</label><input type="text" id="f-org" placeholder="ABC123@AdobeOrg" required>
        <div class="h">Adobe Admin Console → Org profile</div>
      </div>
      <div class="fld"><label>IMS Scope</label><input type="text" id="f-scope"
          value="AdobeID,openid,additional_info.projectedProductContext,read_organizations"></div>
      <div class="fld"><label>Repository ID <span class="opt">(optional)</span></label><input type="text" id="f-repo"
          placeholder="author-pXXXXX-eXXXXXX.adobeaemcloud.com"></div>
      <button type="submit" class="btn-launch">Connect & Launch</button>
    </form>
  </div>

  <div id="v-selector" class="hidden" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div id="aem-selector"></div>
    <div id="tray" class="tray hidden">
      <div class="tray-hdr"><span id="tray-count">0 assets</span><button class="tray-clr" onclick="clearTray()">Clear
          all</button></div>
      <div class="tray-list" id="tray-list"></div>
    </div>
  </div>

  <div class="ftr">Powered by <a href="https://vyingdigital.com" target="_blank">Vying Digital</a></div>

  <script>
    (function () {
      var KEY = 'aem-ext-config';
      var cfg = null;
      var assets = [];

      // BroadcastChannel for communicating with content script on the active page
      var channel = new BroadcastChannel('aem-asset-selector');

      function loadCfg() { try { cfg = JSON.parse(localStorage.getItem(KEY)); } catch (e) { cfg = null; } }
      function saveCfg(c) { cfg = c; localStorage.setItem(KEY, JSON.stringify(c)); }
      function fillForm() {
        if (!cfg) return;
        document.getElementById('f-client').value = cfg.imsClientId || '';
        document.getElementById('f-org').value = cfg.imsOrg || '';
        document.getElementById('f-scope').value = cfg.imsScope || 'AdobeID,openid,additional_info.projectedProductContext,read_organizations';
        document.getElementById('f-repo').value = cfg.repoId || '';
      }

      window.showSetup = function () {
        document.getElementById('v-setup').classList.remove('hidden');
        document.getElementById('v-selector').classList.add('hidden');
        document.getElementById('btn-settings').style.display = 'none';
        fillForm();
      };

      function showSelector() {
        document.getElementById('v-setup').classList.add('hidden');
        var sel = document.getElementById('v-selector');
        sel.classList.remove('hidden');
        sel.style.display = 'flex';
        document.getElementById('btn-settings').style.display = '';
        renderSelector();
      }

      function renderSelector() {
        if (!cfg) return;
        var container = document.getElementById('aem-selector');
        container.innerHTML = '';
        try {
          PureJSSelectors.registerAssetsSelectorsAuthService({
            imsClientId: cfg.imsClientId, imsScope: cfg.imsScope,
            redirectUri: window.location.href, modalMode: true,
            onImsServiceInitialized: function () { },
            onAccessTokenReceived: function () { },
            onAccessTokenExpired: function () { toast('Session expired — reopen panel', 'err'); },
            onErrorReceived: function (t, m) { toast('Auth: ' + m, 'err'); }
          });
        } catch (e) { toast('IMS error: ' + e.message, 'err'); return; }

        var props = { imsOrg: cfg.imsOrg, handleSelection: onSelection, handleAssetSelection: function () { }, onClose: function () { } };
        if (cfg.repoId) props.repositoryId = cfg.repoId;
        try {
          PureJSSelectors.renderAssetSelectorWithAuthFlow(container, props, function () { });
        } catch (e) {
          container.innerHTML = '<div style="padding:20px;color:var(--t3);text-align:center">Error: ' + e.message + '</div>';
        }
      }

      function onSelection(selected) {
        if (!selected || !selected.length) return;
        selected.forEach(function (a) {
          var n = normalize(a);
          var id = n.id || n.path;
          if (!assets.find(function (x) { return (x.id || x.path) === id; })) assets.push(n);
        });
        renderTray();
        toast(selected.length + ' asset' + (selected.length > 1 ? 's' : '') + ' added', 'ok');
      }

      function normalize(a) {
        return {
          id: a.id || a['repo:assetId'] || '', name: a.name || a['repo:name'] || 'Untitled',
          path: a.path || a['repo:path'] || '', mimeType: a['dc:format'] || a.mimetype || a.mimeType || '',
          url: a.url || a['repo:thumbnailUrl'] || '', deliveryUrl: a['repo:deliveryUrl'] || a.url || '',
          width: a['tiff:imageWidth'] || a.width || 0, height: a['tiff:imageLength'] || a.height || 0
        };
      }

      function renderTray() {
        var tray = document.getElementById('tray'), list = document.getElementById('tray-list'), count = document.getElementById('tray-count');
        if (!assets.length) { tray.classList.add('hidden'); return; }
        tray.classList.remove('hidden');
        count.textContent = assets.length + ' asset' + (assets.length > 1 ? 's' : '');
        list.innerHTML = '';

        assets.forEach(function (a, i) {
          var isImg = a.mimeType && a.mimeType.indexOf('image/') === 0;
          var thumb = a.url || a.deliveryUrl;
          var card = document.createElement('div');
          card.className = 'acard';

          var thumbHtml = (isImg && thumb)
            ? '<div class="acard-thumb"><img src="' + thumb + '" alt=""></div>'
            : '<div class="acard-thumb"><span class="ext">' + a.name.split('.').pop().toUpperCase() + '</span></div>';

          card.innerHTML = thumbHtml +
            '<div class="acard-info">' +
            '<div class="acard-name" title="' + a.name + '">' + a.name + '</div>' +
            '<div class="acard-path" title="' + a.path + '">' + a.path + '</div>' +
            '<div class="acard-actions">' +
            '<button class="acard-btn send" data-action="send" data-idx="' + i + '">Send to Page</button>' +
            '<button class="acard-btn" data-action="url" data-idx="' + i + '">Copy URL</button>' +
            (isImg ? '<button class="acard-btn" data-action="html" data-idx="' + i + '">Copy IMG</button>' : '') +
            '<button class="acard-btn" data-action="json" data-idx="' + i + '">Copy JSON</button>' +
            '</div>' +
            '</div>' +
            '<button class="acard-remove" data-idx="' + i + '" title="Remove">&times;</button>';

          list.appendChild(card);
        });
      }

      // Click handlers
      document.addEventListener('click', function (e) {
        var btn = e.target.closest('.acard-btn');
        if (btn) {
          var idx = parseInt(btn.dataset.idx);
          var action = btn.dataset.action;
          var a = assets[idx];
          if (!a) return;
          var url = a.deliveryUrl || a.url;

          // Send to page — broadcasts to content script
          if (action === 'send') {
            channel.postMessage({ type: 'AEM_SEND_TO_PAGE', asset: a });
            btn.classList.add('copied');
            btn.textContent = 'Sent!';
            setTimeout(function () { btn.classList.remove('copied'); btn.textContent = 'Send to Page'; }, 1500);
            toast('Asset sent to page — drag it from the floating widget', 'blue');
            return;
          }

          // Copy actions
          var text = '';
          if (action === 'url') text = url;
          else if (action === 'html') text = '<img src="' + url + '" alt="' + a.name + '" width="' + (a.width || 'auto') + '" height="' + (a.height || 'auto') + '" />';
          else if (action === 'json') text = JSON.stringify(a, null, 2);

          navigator.clipboard.writeText(text).then(function () {
            btn.classList.add('copied');
            var orig = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(function () { btn.classList.remove('copied'); btn.textContent = orig; }, 1500);
          });
          return;
        }

        var rm = e.target.closest('.acard-remove');
        if (rm) { assets.splice(parseInt(rm.dataset.idx), 1); renderTray(); }
      });

      window.clearTray = function () { assets = []; renderTray(); };

      function toast(msg, type) {
        var t = document.createElement('div'); t.className = 'toast ' + (type || '');
        t.textContent = msg; document.body.appendChild(t);
        setTimeout(function () { t.remove(); }, 3500);
      }

      document.getElementById('cfg-form').addEventListener('submit', function (e) {
        e.preventDefault();
        saveCfg({
          imsClientId: document.getElementById('f-client').value.trim(),
          imsOrg: document.getElementById('f-org').value.trim(),
          imsScope: document.getElementById('f-scope').value.trim() || 'AdobeID,openid,additional_info.projectedProductContext,read_organizations',
          repoId: document.getElementById('f-repo').value.trim()
        });
        showSelector();
      });

      loadCfg();
      if (cfg && cfg.imsClientId && cfg.imsOrg) showSelector();
    })();
  </script>
</body>

</html>
